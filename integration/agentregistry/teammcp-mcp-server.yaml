# TeamMCP MCP Server Artifact
# Register with: arctl mcp publish -f teammcp-mcp-server.yaml
#
# This artifact registers TeamMCP as a discoverable MCP server
# in AgentRegistry, enabling auto-discovery and IDE configuration.

apiVersion: v1
kind: MCPServer
metadata:
  name: teammcp
  displayName: "TeamMCP — Multi-Agent Collaboration Server"
  description: >
    MCP-native collaboration server for AI agent teams.
    Provides real-time messaging (channels, DMs), task management,
    full-text search, and web dashboard. Built with 1 npm dependency.
  version: "1.0.0"
  license: MIT
  repository: https://github.com/anthropics/teammcp
  tags:
    - multi-agent
    - collaboration
    - mcp
    - real-time
    - team-communication
    - task-management
  categories:
    - communication
    - collaboration
    - agent-infrastructure

spec:
  # Transport configurations
  transports:
    - type: stdio
      description: "Direct integration with Claude Code via stdin/stdout (default)"
      command: node
      args:
        - teammcp-channel.mjs
      env:
        AGENT_NAME:
          description: "Agent display name"
          required: true
        TEAMMCP_KEY:
          description: "API key for TeamMCP server (tmcp_xxx format)"
          required: true
        TEAMMCP_URL:
          description: "TeamMCP server URL"
          required: false
          default: "http://localhost:3100"

    - type: streamable-http
      description: "HTTP-based MCP endpoint for AgentGateway integration"
      url: "http://localhost:3200/mcp"
      env:
        AGENT_NAME:
          description: "Agent display name"
          required: true
        TEAMMCP_KEY:
          description: "API key for TeamMCP server"
          required: true
        TEAMMCP_URL:
          description: "TeamMCP server URL"
          required: false
          default: "http://localhost:3100"
        MCP_HTTP_PORT:
          description: "HTTP MCP server port"
          required: false
          default: "3200"

  # Tool inventory
  tools:
    - name: send_message
      description: "Send a message to a channel (group chat)"
    - name: send_dm
      description: "Send a direct message to another agent"
    - name: get_history
      description: "View channel message history"
    - name: get_agents
      description: "List all agents and their online status"
    - name: get_channels
      description: "List available channels and unread counts"
    - name: search_messages
      description: "Full-text search across message history (FTS5)"
    - name: edit_message
      description: "Edit a previously sent message"
    - name: delete_message
      description: "Delete a message (soft delete)"
    - name: create_channel
      description: "Create a new channel (group/topic/dm)"
    - name: create_task
      description: "Create a new task with priority and assignee"
    - name: list_tasks
      description: "List tasks with status/assignee/priority filters"
    - name: update_task
      description: "Update task status, result, or other fields"
    - name: done_task
      description: "Quick-mark a task as complete"
    - name: pin_task
      description: "Convert a message into a tracked task"
    - name: start_agent
      description: "Start an agent process (CEO/HR only)"
    - name: stop_agent
      description: "Stop an agent process (CEO/HR only)"
    - name: screenshot_agent
      description: "Capture agent terminal screenshot (CEO/HR only)"
    - name: send_keys_to_agent
      description: "Send keystrokes to agent terminal (CEO/HR only)"

  # Server requirements
  requirements:
    runtime: "Node.js >= 18"
    dependencies:
      - "better-sqlite3 ^11.8.1"
    platform: "Cross-platform (Windows/Linux/macOS)"

  # Performance characteristics
  performance:
    concurrent_agents: 14
    message_throughput: "10 msg/s per agent"
    search_latency: "90-99ms (FTS5)"
    history_query_latency: "59-71ms"
    uptime_tested: "20+ hours continuous"
    concurrent_write_success: "100%"
